# Midnight Tier A — proof server (ZK proving). Start with: npm run midnight:up
# Docs: https://docs.midnight.network/guides/run-proof-server
name: selective-memory-midnight

services:
  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    container_name: selective-memory-proof-server
    command: ["midnight-proof-server", "-v"]
    ports:
      - "6300:6300"
    environment:
      RUST_BACKTRACE: full
